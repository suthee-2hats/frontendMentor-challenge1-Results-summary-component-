<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="stylesheet" href="/src/styles.css">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>
  

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

    <div class="result">

      <h2 id="result-h">Your Result</h2>

       <div id="result-circle">
          
          <h1 id="score">76</h1> 
          <h3 id="out-of">of 100</h3>

       </div>
    
      <h3 id="message">Great</h3>
    <p id="p-afterMessage"> You scored higher than 65% of the people who have taken these tests.</p>

    </div>
 
    <div class="summary">
      <h2>Summary</h2>
      <div class="list reaction">

          <img src="/assets/images/icon-reaction.svg">
          <p>Reaction</p>
          <p><strong>80</strong>/100</p>

      </div>
      <div class="list Memory">

        <img src="/assets/images/icon-memory.svg">
        <p>Memory</p>
        <p><strong>92</strong>/100</p>

      </div>
      <div class="list verbal">

        <img src="/assets/images/icon-verbal.svg">
        <p>verbal</p>
        <p><strong>61</strong>/100</p>

      </div>
      <div class="list visual">

        <img src="/assets/images/icon-visual.svg">
        <p>Visual</p>
        <p><strong>73</strong>/100</p>

      </div>
    <div class="continue">
      <button>Continue</button>
    </div>
    </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
